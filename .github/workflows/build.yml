name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 2.12.5

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Android SDK components
        run: |
          sdkmanager "ndk;27.0.12077973"
          sdkmanager "build-tools;35.0.0"
          sdkmanager "platforms;android-35"

      - name: Set NDK environment variable
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Build native libraries
        working-directory: authenticator
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 -o target/jniLibs build --release --lib

      - name: Verify native libraries
        run: find authenticator/target/jniLibs -name "*.so" -exec ls -la {} \;

      - name: Generate debug keystore
        working-directory: authenticator/android
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias debugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug,O=Debug,C=US"

      - name: Patch signing config
        working-directory: authenticator/android
        run: |
          cat >> app/build.gradle << 'PATCH'

          android.signingConfigs.debug {
              storeFile file("debug.keystore")
              storePassword "android"
              keyAlias "debugkey"
              keyPassword "android"
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.debug
          PATCH

      - name: Build APK
        working-directory: authenticator/android
        run: gradle assembleDebug assembleRelease --no-daemon --stacktrace

      - name: List APK outputs
        run: find authenticator/android/app/build/outputs -name "*.apk" || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: authenticator-debug-apk
          path: authenticator/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: authenticator-release-apk
          path: authenticator/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload native libs
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: authenticator/target/jniLibs/
          if-no-files-found: warn

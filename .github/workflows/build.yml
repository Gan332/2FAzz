name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "ndk;26.1.10909125"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "platforms;android-34"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Setup NDK linker for aarch64
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.aarch64-linux-android]
          linker = "ENVNDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang"

          [target.armv7-linux-androideabi]
          linker = "ENVNDK/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi33-clang"

          [target.x86_64-linux-android]
          linker = "ENVNDK/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android33-clang"

          [target.i686-linux-android]
          linker = "ENVNDK/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android33-clang"
          EOF
          sed -i "s|ENVNDK|$ANDROID_NDK_HOME|g" .cargo/config.toml
          cat .cargo/config.toml

      - name: Build arm64 native library
        run: |
          echo "NDK=$ANDROID_NDK_HOME"
          ls "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -5
          export CC_aarch64_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang"
          export CXX_aarch64_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++"
          export AR_aarch64_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang"
          mkdir -p target/jniLibs/arm64-v8a
          cargo build --release --lib --target aarch64-linux-android 2>&1
          cp target/aarch64-linux-android/release/libauthenticator.so target/jniLibs/arm64-v8a/

      - name: Build arm32 native library
        run: |
          export CC_armv7_linux_androideabi="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi33-clang"
          export AR_armv7_linux_androideabi="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi33-clang"
          mkdir -p target/jniLibs/armeabi-v7a
          cargo build --release --lib --target armv7-linux-androideabi 2>&1
          cp target/armv7-linux-androideabi/release/libauthenticator.so target/jniLibs/armeabi-v7a/

      - name: Build x86_64 native library
        run: |
          export CC_x86_64_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android33-clang"
          export AR_x86_64_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android33-clang"
          mkdir -p target/jniLibs/x86_64
          cargo build --release --lib --target x86_64-linux-android 2>&1
          cp target/x86_64-linux-android/release/libauthenticator.so target/jniLibs/x86_64/

      - name: Build x86 native library
        run: |
          export CC_i686_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android33-clang"
          export AR_i686_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export CARGO_TARGET_I686_LINUX_ANDROID_LINKER="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android33-clang"
          mkdir -p target/jniLibs/x86
          cargo build --release --lib --target i686-linux-android 2>&1
          cp target/i686-linux-android/release/libauthenticator.so target/jniLibs/x86/

      - name: Verify native libraries
        run: find target/jniLibs -name "*.so" -exec ls -la {} \;

      - name: Generate keystore
        working-directory: android
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias debugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug,O=Debug,C=US"

      - name: Add signing config
        working-directory: android
        run: |
          cat >> app/build.gradle << 'PATCH'

          android.signingConfigs.debug {
              storeFile file("debug.keystore")
              storePassword "android"
              keyAlias "debugkey"
              keyPassword "android"
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.debug
          PATCH

      - name: Build APK
        working-directory: android
        run: gradle assembleDebug assembleRelease --no-daemon --stacktrace

      - name: List APK outputs
        run: find android/app/build/outputs -name "*.apk" || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: authenticator-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: authenticator-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload native libs
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: target/jniLibs/
          if-no-files-found: warn

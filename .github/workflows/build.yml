name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: never

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 4.1.2

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "ndk;26.1.10909125"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "platforms;android-34"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Build native library (arm64-v8a)
        id: build_arm64
        run: |
          cargo ndk -t arm64-v8a -o target/jniLibs build --release --lib 2>&1 | tee build-arm64.log
        shell: bash

      - name: Capture build errors
        if: failure() && steps.build_arm64.outcome == 'failure'
        id: capture_errors
        shell: bash
        run: |
          ERRORS=$(tail -80 build-arm64.log | head -c 6000 | tr '\n' ' ' | tr -d '\r')
          echo "errors<<EOFMARKER" >> $GITHUB_OUTPUT
          echo "$ERRORS" >> $GITHUB_OUTPUT
          echo "EOFMARKER" >> $GITHUB_OUTPUT

      - name: Create issue with build errors
        if: failure() && steps.build_arm64.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const errors = `${{ steps.capture_errors.outputs.errors }}`;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `## Build Failure\n\n**Run:** #${context.runNumber} (${runUrl})\n**Commit:** ${context.sha.substring(0,7)}\n\n### Compiler Output\n\`\`\`\n${errors}\n\`\`\`\n\n---\n_Auto-created by CI_`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build failure #${context.runNumber} (${context.sha.substring(0,7)})`,
              body: body,
              labels: ['build-failure']
            });

      - name: Upload build log on failure
        if: failure() && steps.build_arm64.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-arm64-log
          path: build-arm64.log
          if-no-files-found: warn

      - name: Build native library (armeabi-v7a)
        run: cargo ndk -t armeabi-v7a -o target/jniLibs build --release --lib

      - name: Build native library (x86_64)
        run: cargo ndk -t x86_64 -o target/jniLibs build --release --lib

      - name: Build native library (x86)
        run: cargo ndk -t x86 -o target/jniLibs build --release --lib

      - name: Verify native libraries
        run: find target/jniLibs -name "*.so" -exec ls -la {} \;

      - name: Generate keystore
        working-directory: android
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias debugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug,O=Debug,C=US"

      - name: Add signing config
        working-directory: android
        run: |
          cat >> app/build.gradle << 'PATCH'

          android.signingConfigs.debug {
              storeFile file("debug.keystore")
              storePassword "android"
              keyAlias "debugkey"
              keyPassword "android"
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.debug
          PATCH

      - name: Build APK
        id: build_apk
        working-directory: android
        run: |
          set +e
          gradle assembleDebug assembleRelease --no-daemon --stacktrace > build-apk.log 2>&1
          exit_code=$?
          cat build-apk.log
          exit $exit_code
        shell: bash

      - name: Upload APK build log on failure
        if: failure() && steps.build_apk.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-apk-log
          path: android/build-apk.log
          if-no-files-found: warn

      - name: List APK outputs
        run: find android/app/build/outputs -name "*.apk" || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: authenticator-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: authenticator-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload native libs
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: target/jniLibs/
          if-no-files-found: warn
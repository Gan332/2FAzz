name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.7

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "ndk;26.1.10909125"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "platforms;android-34"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Check cargo config
        run: |
          echo "=== Cargo.toml ==="
          cat Cargo.toml
          echo "=== ANDROID_NDK_HOME ==="
          echo "$ANDROID_NDK_HOME"
          ls "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -5

      - name: Build native library (arm64 only first)
        run: |
          cargo ndk -t arm64-v8a -o target/jniLibs build --release --lib 2>&1 || {
            echo "=== RETRY WITH VERBOSE ==="
            cargo ndk -t arm64-v8a -o target/jniLibs build --release --lib -vv 2>&1 | tail -100
            exit 1
          }

      - name: Build remaining targets
        run: |
          cargo ndk -t armeabi-v7a -o target/jniLibs build --release --lib
          cargo ndk -t x86_64 -o target/jniLibs build --release --lib
          cargo ndk -t x86 -o target/jniLibs build --release --lib

      - name: Verify native libraries
        run: find target/jniLibs -name "*.so" -exec ls -la {} \;

      - name: Generate keystore
        working-directory: android
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias debugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug,O=Debug,C=US"

      - name: Add signing config
        working-directory: android
        run: |
          cat >> app/build.gradle << 'PATCH'

          android.signingConfigs.debug {
              storeFile file("debug.keystore")
              storePassword "android"
              keyAlias "debugkey"
              keyPassword "android"
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.debug
          PATCH

      - name: Build APK
        working-directory: android
        run: gradle assembleDebug assembleRelease --no-daemon --stacktrace

      - name: List APK outputs
        run: find android/app/build/outputs -name "*.apk" || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: authenticator-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: authenticator-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload native libs
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: target/jniLibs/
          if-no-files-found: warn
